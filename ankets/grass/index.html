<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f12;--surface:#161820;--surface2:#1e2028;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.18);--text:#f0f0f0;--text-muted:#555;--text-dim:#888;--accent:#4f7fff;--radius:14px}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Geologica',sans-serif;font-weight:300}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4rem 1.5rem 3rem}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(79,127,255,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrapper{position:relative;z-index:1;width:100%;max-width:720px}
header{text-align:center;margin-bottom:3rem;animation:fadeUp 0.5s ease both}
.logo-dot{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%;margin-bottom:1.5rem;box-shadow:0 0 16px var(--accent);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)}}
h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:500;letter-spacing:-0.02em;margin-bottom:0.5rem}
.subtitle{font-size:0.88rem;color:var(--text-dim);font-weight:300}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.point-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);text-decoration:none;font-family:'Geologica',sans-serif;font-size:0.88rem;font-weight:400;cursor:pointer;transition:background 0.15s,border-color 0.15s,transform 0.12s;animation:fadeUp 0.4s ease both}
.point-btn:hover{background:var(--surface2);border-color:var(--border-hover);transform:translateY(-1px)}
.arrow{flex-shrink:0;opacity:0;transition:opacity 0.15s,transform 0.15s;color:var(--accent)}
.point-btn:hover .arrow{opacity:1;transform:translateX(2px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.state-box{text-align:center;padding:4rem 1rem;color:var(--text-muted);font-size:0.88rem;line-height:1.7}
.spinner{width:28px;height:28px;margin:0 auto 1rem;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){body{padding:2.5rem 1rem 2rem}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="wrapper">
  <header>
    <div class="logo-dot"></div>
    <h1 id="landing-title">Grass</h1>
    <p class="subtitle" id="landing-subtitle"></p>
  </header>
  <div id="container"><div class="state-box"><div class="spinner"></div>Получаем данные...</div></div>
</div>
<script>
const SHEET_ID='15vGfiOSHEpyaJRpX51sPEj54H-so3jmdY2Lhf_6VNkU';
const GID_POINTS='0';
const GID_CONFIG='1807093399';
function csvUrl(gid){return'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+gid}
function parseCSV(t){return t.trim().split(/\r?\n/).map(line=>{const cols=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){q=!q;continue}if(c===','&&!q){cols.push(cur.trim());cur='';continue}cur+=c}cols.push(cur.trim());return cols})}
async function loadSheet(gid){const r=await fetch(csvUrl(gid));if(!r.ok)throw new Error('HTTP '+r.status);return parseCSV(await r.text())}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function enc(s){return encodeURIComponent(s||'')}
async function init(){
  const container=document.getElementById('container');
  try{
    const[cfgRows,ptRows]=await Promise.all([loadSheet(GID_CONFIG).catch(()=>[]),loadSheet(GID_POINTS)]);
    const cfg={};cfgRows.forEach(r=>{if(r.length>=2&&r[0].toLowerCase()!=='key')cfg[r[0]]=r[1]});
    const title=cfg.landingTitle||'Grass';
    document.title=title;
    document.getElementById('landing-title').textContent=title;
    if(cfg.landingSubtitle)document.getElementById('landing-subtitle').textContent=cfg.landingSubtitle;
    const points=ptRows.slice(1).filter(r=>r[0]&&r[1]);
    if(!points.length){container.innerHTML='<div class="state-box">Точки не добавлены</div>';return}
    const grid=document.createElement('div');grid.className='grid';
    points.forEach((p,i)=>{
      const url='optimum://external?ServerID='+enc(cfg.serverID)+'&ProjectID='+enc(cfg.projectID)+'&PointID='+enc(p[1])+'&OptimumUserId='+enc(cfg.optimumUserID)+'&ReverseURL='+enc(cfg.reverseURL);
      const a=document.createElement('a');a.className='point-btn';a.href='javascript:void(0)';a.style.animationDelay=(i*0.035)+'s';
      a.innerHTML='<span>'+esc(p[0])+'</span><svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
      a.onclick=function(e){e.preventDefault();window.location.href=url;};
      grid.appendChild(a);
    });
    container.innerHTML='';container.appendChild(grid);
  }catch(e){
    container.innerHTML='<div class="state-box">Ошибка загрузки данных.<br><small>'+esc(e.message)+'</small></div>';
  }
}
init();
</script>
</body>
</html>
